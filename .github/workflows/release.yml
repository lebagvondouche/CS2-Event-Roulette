name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish --configuration Release --output publish/RandomRoundEvents

      - name: Zip release
        run: |
          cd publish/RandomRoundEvents
          rm -f *.pdb
          cp ../../RandomRoundEvents.json .
          cd ..
          zip -r ../RandomRoundEvents-${{ github.ref_name }}.zip RandomRoundEvents/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: RandomRoundEvents-${{ github.ref_name }}.zip
          generate_release_notes: true
