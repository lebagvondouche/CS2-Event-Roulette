// RandomRoundEvents - Test Server Config
// Place in: cs2-server/game/csgo/cfg/server_test.cfg
// Load with: exec server_test

// Fast rounds
mp_roundtime 1.5
mp_roundtime_defuse 1.5
mp_roundtime_hostage 1.5
mp_freezetime 0
mp_warmuptime 0
mp_warmup_pausetimer 0
mp_buytime 5
mp_buy_anywhere 1

// Round settings
mp_maxrounds 100
mp_halftime 0
mp_match_restart_delay 3
mp_round_restart_delay 2

// No money worries
mp_startmoney 16000
mp_afterroundmoney 16000
mp_maxmoney 16000

// Fill with bots
bot_quota 10
bot_quota_mode fill
bot_difficulty 1
bot_join_after_player 1
bot_chatter off

// Gameplay
mp_autoteambalance 1
mp_limitteams 0
mp_friendlyfire 0
mp_death_drop_gun 0
sv_alltalk 1
sv_deadtalk 1

// No vote nonsense
sv_vote_allow_spectators 0
mp_autokick 0

// Performance
sv_lan 1
